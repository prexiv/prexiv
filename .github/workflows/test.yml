name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Format
        run: cargo fmt --check
        working-directory: rust

      - name: Test
        run: cargo test
        working-directory: rust

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: rust

      - name: Release build
        run: cargo build --release
        working-directory: rust

  mcp:
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prexiv
          POSTGRES_PASSWORD: prexiv
          POSTGRES_DB: prexiv_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://prexiv:prexiv@127.0.0.1:5432/prexiv_test
      PREXIV_DATA_KEY: 000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f
      DATA_DIR: /tmp/prexiv-data
      UPLOAD_DIR: /tmp/prexiv-data/uploads
      APP_URL: http://localhost:3000
      PORT: "3000"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Install MCP deps
        run: npm ci
        working-directory: mcp

      - name: Build Rust server
        run: cargo build --release
        working-directory: rust

      - name: Start Rust server
        run: |
          mkdir -p "$UPLOAD_DIR"
          ./rust/target/release/prexiv > server.log 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for readiness
        run: |
          for i in $(seq 1 60); do
            if curl -sS -f -o /dev/null http://localhost:3000/readyz; then
              echo "server is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server did not become ready"
          tail -n 200 server.log || true
          exit 1

      - name: MCP syntax check
        run: npm run check
        working-directory: mcp

      - name: MCP live smoke test
        run: BASE=http://localhost:3000/api/v1 python3 tests/prexiv_mcp_test.py

      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "$SERVER_PID" 2>/dev/null || true
            for i in $(seq 1 10); do
              if ! kill -0 "$SERVER_PID" 2>/dev/null; then break; fi
              sleep 1
            done
            kill -9 "$SERVER_PID" 2>/dev/null || true
          fi

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
          if-no-files-found: ignore
